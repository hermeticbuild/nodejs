name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  configure-audit:
    name: Configure audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check configure audit
        run: tools/configure_check_audit.sh --check

      - name: Check bundled V8, ICU, and Rust crate target graphs
        run: >-
          bazel query
          --lockfile_mode=error
          'deps(@v8//:icu/d8) + deps(@nodejs_icu_26_3_1//:icu) + deps(@nodejs_crates_26_3_1//:cargo_files)'
          >/dev/null

      - name: Test consumer source contract
        working-directory: tests/integration
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            //:source_contract_test

      - name: Build bundled ICU
        run: |
          bazel build \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            @nodejs_icu_26_3_1//:icu

      - name: Check unsupported Node.js version
        working-directory: tests/unsupported_version
        run: |
          if output="$(bazel query --lockfile_mode=off '@nodejs_26_3_2//...' 2>&1)"; then
            echo "unsupported Node.js version unexpectedly succeeded" >&2
            exit 1
          fi
          grep -F 'Unsupported Node.js version "26.3.2"; supported versions are 26.3.1' <<<"$output"

  windows-x86_64:
    name: Windows x86_64 remote build / Node.js 26.3.1
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build node.exe and validate the release ZIP
        run: |
          bazel build \
            --config=ci \
            --config=release \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            --platforms=@llvm//platforms:windows_x86_64_msvc \
            //tests/node:node_windows_binary \
            //tests/release:windows_release_archive_validation

      - name: Upload node.exe
        uses: actions/upload-artifact@v4
        with:
          name: node-windows-x86_64
          path: bazel-bin/tests/node/node.exe
          if-no-files-found: error

  windows-x86_64-execution:
    name: Windows x86_64 execution / Node.js 26.3.1
    needs: windows-x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Download node.exe
        uses: actions/download-artifact@v4
        with:
          name: node-windows-x86_64
          path: node-windows-x86_64

      - name: Test node.exe
        run: python tests/node/node_windows_test.py node-windows-x86_64/node.exe x64

  windows-arm64:
    name: Windows arm64 remote build / Node.js 26.3.1
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build node.exe and validate the release ZIP
        run: |
          bazel build \
            --config=ci \
            --config=release \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            --platforms=@llvm//platforms:windows_aarch64_msvc \
            //tests/node:node_windows_binary \
            //tests/release:windows_release_archive_validation

      - name: Upload node.exe
        uses: actions/upload-artifact@v4
        with:
          name: node-windows-arm64
          path: bazel-bin/tests/node/node.exe
          if-no-files-found: error

  windows-arm64-execution:
    name: Windows arm64 execution / Node.js 26.3.1
    needs: windows-arm64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download node.exe
        uses: actions/download-artifact@v4
        with:
          name: node-windows-arm64
          path: node-windows-arm64

      - name: Test node.exe
        run: python tests/node/node_windows_test.py node-windows-arm64/node.exe arm64

  test:
    name: ${{ matrix.system.name }} / Node.js 26.3.1
    runs-on: ${{ matrix.system.runner }}
    strategy:
      fail-fast: false
      matrix:
        system:
          - name: Linux x86_64
            runner: ubuntu-24.04
            platform: "@llvm//platforms:linux_x86_64"
            test_strategy: remote
            upstream_target: "@nodejs_26_3_1//:node_upstream_tests"
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            platform: "@llvm//platforms:linux_aarch64"
            test_strategy: local
            upstream_target: "@nodejs_26_3_1//:node_upstream_smoke_test"
          - name: macOS x86_64
            runner: macos-15-intel
            platform: "@llvm//platforms:macos_x86_64"
            test_strategy: local
            upstream_target: "@nodejs_26_3_1//:node_upstream_smoke_test"
          - name: macOS arm64
            runner: macos-15
            platform: "@llvm//platforms:macos_aarch64"
            test_strategy: local
            upstream_target: "@nodejs_26_3_1//:node_upstream_smoke_test"

    steps:
      - uses: actions/checkout@v4

      - name: Test Node.js
        run: |
          bazel test \
            --config=ci \
            --config=release \
            --config=remote \
            --build_tests_only \
            --jobs=64 \
            --local_test_jobs=4 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            "--strategy=TestRunner=${{ matrix.system.test_strategy }}" \
            -- \
            //tests/... \
            -//tests/integration/... \
            "${{ matrix.system.upstream_target }}"
