name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  configure-audit:
    name: Configure audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check configure audit
        run: tools/configure_check_audit.sh --check

      - name: Check bundled V8, ICU, and Rust crate target graphs
        run: >-
          bazel query
          --lockfile_mode=error
          'deps(@v8//:icu/d8) + deps(@nodejs_icu_26_3_1//:icu) + deps(@nodejs_crates_26_3_1//:cargo_files)'
          >/dev/null

      - name: Build bundled ICU
        run: |
          bazel build \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            @nodejs_icu_26_3_1//:icu

      - name: Check unsupported Node.js version
        working-directory: tests/unsupported_version
        run: |
          if output="$(bazel query --lockfile_mode=off '@nodejs_26_3_2//...' 2>&1)"; then
            echo "unsupported Node.js version unexpectedly succeeded" >&2
            exit 1
          fi
          grep -F 'Unsupported Node.js version "26.3.2"; supported versions are 26.3.1' <<<"$output"

  test:
    name: ${{ matrix.system.name }} / Node.js 26.3.1
    runs-on: ${{ matrix.system.runner }}
    strategy:
      fail-fast: false
      matrix:
        system:
          - name: Linux x86_64
            runner: ubuntu-24.04
            platform: "@llvm//platforms:linux_x86_64"
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            platform: "@llvm//platforms:linux_aarch64"
          - name: macOS x86_64
            runner: macos-15-intel
            platform: "@llvm//platforms:macos_x86_64"
          - name: macOS arm64
            runner: macos-15
            platform: "@llvm//platforms:macos_aarch64"

    steps:
      - uses: actions/checkout@v4

      - name: Test source contract
        working-directory: tests/integration
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            --local_test_jobs=4 \
            --strategy=TestRunner=local \
            //:source_contract_test

      - name: Build bundled libuv
        run: |
          bazel build \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            @nodejs_26_3_1//:libuv

      - name: Test bundled C dependencies
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --local_test_jobs=4 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            --strategy=TestRunner=local \
            //tests/ada:ada_test \
            //tests/brotli:brotli_test \
            //tests/cares:cares_test \
            //tests/histogram:histogram_test \
            //tests/llhttp:llhttp_test \
            //tests/libuv:libuv_version_test \
            //tests/nbytes:nbytes_test \
            //tests/ncrypto:ncrypto_test \
            //tests/nghttp2:nghttp2_test \
            //tests/merve:merve_test \
            //tests/openssl:openssl_test \
            //tests/simdjson:simdjson_test \
            //tests/sqlite:sqlite_test \
            //tests/uvwasi:uvwasi_test \
            //tests/zlib:zlib_test \
            //tests/zstd:zstd_test

      - name: Test Node.js js2c
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --local_test_jobs=4 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            --strategy=TestRunner=local \
            //tests/js2c:node_js2c_test

      - name: Test Rust 1.82 toolchain
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --local_test_jobs=4 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            --strategy=TestRunner=local \
            //tests/rust:rust_toolchain_test

      - name: Build bundled Temporal Rust crates
        run: |
          bazel build \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            @nodejs_crates_26_3_1//:temporal_capi

      - name: Test V8 Temporal
        run: |
          bazel test \
            --config=ci \
            --config=remote \
            --jobs=64 \
            --local_test_jobs=4 \
            --lockfile_mode=error \
            "--extra_execution_platforms=@nodejs//:rbe_platform,${{ matrix.system.platform }}" \
            "--platforms=${{ matrix.system.platform }}" \
            --strategy=TestRunner=local \
            //tests/temporal:all
